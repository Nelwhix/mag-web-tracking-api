networks:
  web-tracking-be:

services:
  db:
    image: postgres:18-alpine
    container_name: mag-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - web-tracking-be

  app:
    build:
      context: .
      dockerfile: docker/node.dockerfile
    container_name: web-tracking-app
    ports:
      - "3000:3000"
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - db
    networks:
      - web-tracking-be

volumes:
  postgres_data:
